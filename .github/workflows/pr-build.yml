name: PR Build Check

on:
  pull_request:
    branches:
      - develop
      - staging
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download staging dependencies
        if: github.base_ref == 'staging'
        shell: pwsh
        run: |
          .\scripts\SteamDownloader.ps1 -steam_appid 258550 -steam_branch staging -platform linux -deps_dir "../raw-deps"
          .\scripts\unprivate-dependencies.ps1 -outputPath "deps/linux/" -inputPath "raw-deps/linux/RustDedicated_Data/Managed"

      - name: Download public dependencies
        if: github.base_ref == 'develop' || github.base_ref == 'main'
        shell: pwsh
        run: |
          .\scripts\SteamDownloader.ps1 -steam_appid 258550 -platform linux -deps_dir "../raw-deps"
          .\scripts\unprivate-dependencies.ps1 -outputPath "deps/linux/" -inputPath "raw-deps/linux/RustDedicated_Data/Managed"

      - name: Build
        run: dotnet build src/ThoriumRustMod/ThoriumRustMod.csproj -c Linux
